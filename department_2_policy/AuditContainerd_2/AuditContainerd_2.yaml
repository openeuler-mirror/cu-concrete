#部门编号
dep: 2
#加固项编号
id: 2
query:
    path: 
      - "/var/run/docker/containerd/containerd.pid" #配置文件路径
      - "/etc/audit/rules.d/02-docker.rules"
      - "/usr/sbin/auditctl"
    form: '-w /var/run/docker/containerd/containerd.pid -p wa -k containerd'  #正则表达式
change:
    set: "auditctl"
    value: "'^[^#;]'"
description: '为containerd.pid配置审计功能'
#Ensure auditing is configured for the Docker related files (Automated) cis 1.1.3