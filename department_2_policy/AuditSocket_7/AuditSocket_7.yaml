#部门编号
dep: 2
#加固项编号
id: 7
query:
    path: 
      - "/var/run/docker.sock" #配置文件路径
      - "/etc/audit/rules.d/07-docker.rules"
      - "/usr/sbin/auditctl"
    form: '-w /var/run/docker.sock -p wa -k docker'
change:
    set: "auditctl"
    value: "'^[^#;]'"
description: '为/var/run/docker.sock配置审计功能'
#Ensure auditing is configured for the Docker related files (Automated) cis 1.1.3