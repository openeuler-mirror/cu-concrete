#部门编号
dep: 2
#加固项编号
id: 10
query:
    path: 
      - "/var/run/docker/containerd/containerd.toml" #配置文件路径
      - "/etc/audit/rules.d/10-docker.rules"
      - "/usr/sbin/auditctl"
    form: "-w /var/run/docker/containerd/containerd.toml -p wa -k docker"
change:
    set: "auditctl"
    value: "'^[^#;]'"
description: '为containerd.toml配置审计功能'
#Ensure auditing is configured for the Docker related files (Automated) cis 1.1.3