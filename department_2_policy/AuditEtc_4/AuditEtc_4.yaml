#部门编号
dep: 2
#加固项编号
id: 4
query:
    path: 
      - "/etc/docker " #配置文件路径
      - "/etc/audit/rules.d/04-docker.rules"
      - "/usr/sbin/auditctl"
    form: '-w /etc/docker -p wa -k docker'  #正则表达式
change:
    set: "auditctl"
    value: "'^[^#;]'"
description: '为/etc/docker配置审计功能'
#Ensure auditing is configured for the Docker related files (Automated) cis 1.1.3