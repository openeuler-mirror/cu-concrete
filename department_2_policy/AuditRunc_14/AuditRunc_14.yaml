#部门编号
dep: 2
#加固项编号
id: 14
query:
    path: 
      - "/usr/bin/runc" #配置文件路径
      - "/etc/audit/rules.d/14-docker.rules"
      - "/usr/sbin/auditctl"
    form: "-w /usr/bin/runc -p wa -k docker"
change:
    set: "auditctl"
    value: "'^[^#;]'"
description: '为/usr/bin/runc配置审计功能'
#Ensure auditing is configured for the Docker related files (Automated) cis 1.1.3