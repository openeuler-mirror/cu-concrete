#部门编号
dep: 2
#加固项编号
id: 3
query:
    path: 
      - "/var/lib/docker" #配置文件路径
      - "/etc/audit/rules.d/03-docker.rules"
      - "/usr/sbin/auditctl"
    form: '-w /var/lib/docker -p wa -k docker'  #正则表达式
change:
    set: "auditctl"
    value: "'^[^#;]'"
description: '为/var/lib/docker配置审计功能'
#Ensure auditing is configured for the Docker related files (Automated) cis 1.1.3