<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CU/CONCRETE HARDENING SYSTEM</title>
    <style>

        :root {
            --bg: #ffffff; --fg: #000000; --muted: #444444; --accent: #ff0000; --border: #000000; --radius: 0px;
            --font: 'Helvetica Neue', Arial, sans-serif; --mono: 'Courier New', monospace;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--fg); line-height: 1.25; }
        .border { border: 2px solid var(--border); }
        .app { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
        .sidebar { border-right: 2px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        .brand { border: 2px solid var(--border); padding: 16px; margin-bottom: 20px; text-align: center; }
        .brand h1 { font-size: 18px; letter-spacing: 2px; text-transform: uppercase; }
        .brand p { font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 4px; }
        .nav-item { border: 2px solid transparent; padding: 12px; cursor: pointer; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; transition: 0.2s; }
        .nav-item:hover, .nav-item.active { border-color: var(--border); background: var(--fg); color: var(--bg); }
        .main { padding: 24px; }
        .header { border-bottom: 2px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: flex-end; }
        .header h2 { font-size: 32px; text-transform: uppercase; letter-spacing: 3px; }
        .header p { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 6px; }
        .badge-status { border: 2px solid var(--border); padding: 4px 10px; font-family: var(--mono); font-size: 11px; text-transform: uppercase; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
        .card { border: 2px solid var(--border); padding: 20px; background: var(--bg); }
        .card-title { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 16px; border-bottom: 2px solid var(--border); padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .card-title .icon { font-family: var(--mono); }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; font-weight: 700; }
        input, select { width: 100%; border: 2px solid var(--border); padding: 12px; font-family: var(--font); font-size: 14px; background: var(--bg); color: var(--fg); border-radius: 0; }
        input:focus, select:focus { outline: none; background: var(--fg); color: var(--bg); }
        .btn { border: 2px solid var(--border); padding: 12px 20px; background: var(--bg); color: var(--fg); font-family: var(--font); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; cursor: pointer; transition: 0.15s; }
        .btn:hover { background: var(--fg); color: var(--bg); }
        .btn-primary:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .btn-danger:hover { background: var(--accent); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .pool-card { border: 2px solid var(--border); padding: 18px; cursor: pointer; transition: 0.15s; }
        .pool-card:hover { transform: translate(-3px, -3px); box-shadow: 6px 6px 0 var(--fg); }
        .pool-card.selected { background: var(--fg); color: var(--bg); }
        .pool-name { font-size: 16px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .pool-meta { font-family: var(--mono); font-size: 11px; }
        .task-item { border-bottom: 2px solid var(--border); padding: 14px 0; display: flex; justify-content: space-between; font-family: var(--mono); font-size: 13px; }
        .task-item:last-child { border-bottom: none; }
        .status { display: inline-block; padding: 2px 8px; border: 2px solid var(--border); font-size: 10px; text-transform: uppercase; margin-left: 8px; }
        .status-success { background: var(--bg); }
        .status-running { background: var(--fg); color: var(--bg); }
        .status-failed { background: var(--accent); color: #fff; }
        .harden-item { border: 2px solid var(--border); padding: 12px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .harden-item:hover { background: var(--fg); color: var(--bg); }
        .harden-item.selected { background: var(--fg); color: var(--bg); }
        .harden-item input { width: auto; }
        .table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .table th, .table td { border: 2px solid var(--border); padding: 10px; text-align: left; }
        .table th { text-transform: uppercase; font-size: 11px; letter-spacing: 1px; background: var(--fg); color: var(--bg); }
        .result-box { border: 2px solid var(--border); padding: 16px; font-family: var(--mono); font-size: 12px; white-space: pre-wrap; max-height: 400px; overflow: auto; }
        .log-box { border: 2px solid var(--border); padding: 16px; font-family: var(--mono); font-size: 12px; line-height: 1.6; max-height: 300px; overflow: auto; }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .alert { border: 2px solid var(--border); padding: 12px; margin-bottom: 16px; font-family: var(--mono); font-size: 12px; }
        .alert-success { border-color: #000; background: #fff; }
        .alert-error { border-color: var(--accent); background: var(--accent); color: #fff; }
        .alert-info { border-color: var(--border); background: #f0f0f0; }
        .hidden { display: none !important; }
        .mono { font-family: var(--mono); }
        .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 8px; }

<script>

        p5: Array.from({length: 7}, (_, i) => `10.0.5.${i + 1}`),
    };
    return base[poolId] || [];
}

let selectedPool = '', selectedHosts = [], selectedHarden = [];

    if (tab === 'tasks') loadTasks();

}
function renderOverview() {
    $('activityList').innerHTML = DATA.tasks.slice(0,3).map(t => `<div class="task-item"><div>${t.id} · ${t.pool}</div><div><span class="status status-${t.status}">${t.status}</span></div></div>`).join('');

}

items:
