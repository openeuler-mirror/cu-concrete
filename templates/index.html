<!DOCTYPE html>

    <style>

        :root {

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--fg); min-height: 100vh; overflow-x: hidden; }

        .grid-overlay { position: fixed; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 50%, transparent 0%, rgba(5,8,17,0.95) 80%), linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px), linear-gradient(0deg, rgba(0,240,255,0.03) 1px, transparent 1px); background-size: 100% 100%, 40px 40px, 40px 40px; z-index: 0; }
        .app { position: relative; z-index: 1; display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

        .nav-item { padding: 14px 18px; border: 1px solid transparent; border-radius: var(--radius); cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-size: 15px; color: var(--muted); }

        .main { padding: 28px; display: flex; flex-direction: column; gap: 24px; }

        .topbar h2 { font-size: 26px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px var(--accent); }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 24px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        select, input { width: 100%; background: rgba(5,8,17,0.6); border: 1px solid var(--border); border-radius: var(--radius); color: var(--fg); padding: 12px 14px; font-family: var(--font); transition: 0.3s; }

        .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
        .pool-card { padding: 20px; border: 1px solid var(--border); border-radius: var(--radius); background: rgba(0,240,255,0.03); cursor: pointer; transition: 0.3s; text-align: center; position: relative; }

        .table th { color: var(--accent); text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }

        .result-box { background: rgba(5,8,17,0.8); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; font-family: var(--mono); font-size: 12px; max-height: 400px; overflow: auto; white-space: pre-wrap; color: var(--fg); }

        .stat-box { padding: 18px; border: 1px solid var(--border); border-radius: var(--radius); text-align: center; background: rgba(0,240,255,0.03); }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); font-family: var(--mono); }

        return `<div class="pool-card ${selectedPool===p.id?'selected':''}" onclick="selectPool('${p.id}')">

            <div class="pool-meta">${p.region} · ${p.hosts} 节点</div>

    }).join('');
}

    $('taskDetail').innerHTML = `<div class="card" style="background:rgba(0,240,255,0.05)"><div class="badge badge-${t.status}">${t.status.toUpperCase()}</div><p>任务: ${t.id}</p><p>云池: ${t.pool}</p><p>进度: ${t.progress}%</p></div>`;

function getTaskLogs() { $('taskDetail').innerHTML = `<div class="log-box">[INFO] 初始化加固引擎...
[INFO] 连接目标节点...
[SUCCESS] 策略下发完成</div>`; }

function initPlaybook() {
    $('playbookPoolId').innerHTML = '<option value="">请选择</option>' + DATA.pools.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    $('hardenItemList').innerHTML = DATA.hardenItems.map(h => `<div class="harden-item" onclick="toggleHarden('${h.id}')">
        <input type="checkbox" ${selectedHarden.includes(h.id)?'checked':''} onclick="event.stopPropagation();toggleHarden('${h.id}')">
        <div><div class="pool-name">${h.name}</div><div class="pool-meta">${h.level} · ${h.desc}</div></div>
    </div>`).join('');
}

function loadPoolHosts() {
    const poolId = $('playbookPoolId').value;
    if (!poolId) { $('hostList').innerHTML = ''; return; }
    selectedHosts = [];
    const hosts = hosts_for_pool(poolId);
    $('hostList').innerHTML = hosts.map(ip => `<div class="harden-item" onclick="toggleHost('${ip}')">
        <input type="checkbox" onclick="event.stopPropagation();toggleHost('${ip}')"> <div class="pool-name">${ip}</div>
    </div>`).join('');
}

function toggleHost(ip) {
    selectedHosts = selectedHosts.includes(ip) ? selectedHosts.filter(x => x !== ip) : [...selectedHosts, ip];
    renderHostSelection();
}
function toggleHarden(id) {
    selectedHarden = selectedHarden.includes(id) ? selectedHarden.filter(x => x !== id) : [...selectedHarden, id];
    initPlaybook();
}
function renderHostSelection() {
    Array.from($('hostList').children).forEach((el) => {
        const ip = el.querySelector('.pool-name').textContent;
        el.querySelector('input').checked = selectedHosts.includes(ip);
        el.classList.toggle('selected', selectedHosts.includes(ip));
    });
}
function generateConfig() {
    if (!selectedHosts.length || !selectedHarden.length) { showAlert('请选择云池、机器和加固项', 'error'); return; }
    const items = DATA.hardenItems.filter(h => selectedHarden.includes(h.id)).map(h => h.name).join(', ');
    $('playbookResult').innerHTML = `<div class="result-box">[inventory]
targets=${selectedHosts.join(',')}

[playbook]
items=${items}</div>`;
}
function resetPlaybook() { selectedHosts = []; selectedHarden = []; $('playbookPoolId').value = ''; $('playbookResult').innerHTML = ''; initPlaybook(); }

function getResults() {
    const file = $('resultFile').value;
    if (!file) { showAlert('请输入任务 ID', 'error'); return; }
    const size = parseInt($('pageSize').value) || 10;
    let rows = '';
    for (let i = 1; i <= size; i++) rows += `<tr><td>${file}</td><td>host-${i}</td><td>success</td><td>${Math.random() > 0.2 ? '合规' : '需修复'}</td></tr>`;
    $('resultsContainer').innerHTML = `<table class="table"><thead><tr><th>任务</th><th>主机</th><th>状态</th><th>结论</th></tr></thead><tbody>${rows}</tbody></table><div class="pagination"><button class="page-btn active">1</button><button class="page-btn">2</button></div>`;
}

function refreshLogs() {
    const now = new Date().toLocaleString('zh-CN');
    $('logBox').textContent = `[${now}] 系统启动完成
[${now}] 连接云池节点 5/5
[${now}] 策略同步完成
[${now}] 无异常告警`;
}
function exportLogs() { showAlert('日志已导出到 /var/log/cu-concrete.log', 'success'); }
function showAlert(msg, type) {
    const div = document.createElement('div'); div.className = `alert alert-${type}`; div.textContent = msg;
    document.querySelector('.main').insertBefore(div, document.querySelector('.main').children[1]);
    setTimeout(() => div.remove(), 3000);
}
