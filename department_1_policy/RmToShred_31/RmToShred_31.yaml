#部门编号
dep: 1
#加固项编号
id: 31
query:
    form: "^rm() {"
    path: "/usr/bin/rm"
change:
    value: |
        rm() {
            # 处理rm命令的各种选项，确保与shred兼容
            local force=false
            local interactive=false
            local recursive=false
            local verbose=false
            local preserve_root=true
            local files=()
            local other_options=()

            # 解析参数
            while [[ $# -gt 0 ]]; do
                case "$1" in
                    -f|--force)
                        force=true
                        shift
                        ;;
                    -i|--interactive)
                        interactive=true
                        shift
                        ;;
                    -r|-R|--recursive)
                        recursive=true
                        shift
                        ;;
                    -rf|-fr)
                        force=true
                        recursive=true
                        shift
                        ;;
                    -v|--verbose)
                        verbose=true
                        shift
                        ;;
                    --no-preserve-root)
                        preserve_root=false
                        shift
                        ;;
                    --preserve-root)
                        preserve_root=true
                        shift
                        ;;
                    --help|--version)
                        # 这些选项直接传递给原始rm-rule命令
                        command rm-rule "$@"
                        return $?
                        ;;
                    --)
                        shift
                        # 收集剩余的所有参数作为文件
                        while [[ $# -gt 0 ]]; do
                            files+=("$1")
                            shift
                        done
                        break
                        ;;
                    -*)
                        # 其他选项暂时收集，但会切换到原始rm-rule
                        other_options+=("$1")
                        shift
                        ;;
                    *)
                        # 文件参数
                        files+=("$1")
                        shift
                        ;;
                esac
            done

            # 如果有其他不被shred支持的选项，或者要递归删除根目录，使用原始rm-rule
            # 但单独的-i参数应该由脚本处理，而不是交给rm-rule
            if [[ ${#other_options[@]} -gt 0 ]] || ([[ "$recursive" == true && "$preserve_root" == false && "${files[*]}" == "/" ]]); then
                command rm-rule "${other_options[@]}" $( [[ "$force" == true ]] && echo '-f' ) $( [[ "$interactive" == true ]] && echo '-i' ) $( [[ "$recursive" == true ]] && echo '-r' ) $( [[ "$verbose" == true ]] && echo '-v' ) "${files[@]}"
                return $?
            fi

            # 如果没有指定文件，显示帮助信息
            if [[ ${#files[@]} -eq 0 ]]; then
                command rm-rule --help
                return 0
            fi

            # 递归处理函数，用于在目录中使用shred删除文件
            shred_recursive() {
                local dir="$1"
                local verbose_flag="$2"
                local force_flag="$3"
                local interactive_flag="$4"

                # 遍历目录中的所有项目
                for item in "$dir"/* "$dir"/.[^.]*; do
                    # 检查是否是有效路径（排除不存在的文件）
                    [ -e "$item" ] || continue

                    if [ -d "$item" ] && [ ! -L "$item" ]; then
                        # 如果是目录，递归处理
                        shred_recursive "$item" "$verbose_flag" "$force_flag" "$interactive_flag"
                        # 目录本身稍后由rm-rule删除
                    elif [ -f "$item" ] || [ -L "$item" ]; then
                        # 如果是普通文件或符号链接，使用shred删除
                        local shred_opts=(-u -z)  # -u删除文件，-z最后一次用零覆盖
                        #if [ "$verbose_flag" = true ]; then
                            #shred_opts+=(-v)
                            #echo "shred: '$item'"
                        #fi

                        if ! command shred "${shred_opts[@]}" "$item" 2>/dev/null; then
                            # 如果shred失败，回退到原始rm-rule
                            if [ "$verbose_flag" = true ]; then
                                echo "rm: falling back to rm for '$item'"
                            fi
                            command rm-rule $( [ "$force_flag" = true ] && echo '-f' ) $( [ "$interactive_flag" = true ] && echo '-i' ) $( [ "$verbose_flag" = true ] && echo '-v' ) "$item"
                        fi
                    fi
                done
            }

            # 处理每个文件
            local exit_code=0
            for file in "${files[@]}"; do
                # 检查文件是否存在
                if [[ ! -e "$file" && ! -L "$file" ]]; then
                    if [[ "$force" == false ]]; then
                        echo "rm: cannot remove '$file': No such file or directory" >&2
                        exit_code=1
                    fi
                    continue
                fi

                # 如果启用了交互模式
                if [[ "$interactive" == true ]]; then
                    # 询问用户确认删除
                    echo -n "rm: remove '$file'? " >&2
                    read -r response < /dev/tty
                    if [[ ! "$response" =~ ^[Yy]$ ]]; then
                        continue  # 用户选择不删除，跳过此文件
                    fi
                fi

                # 如果是递归删除目录
                if [[ "$recursive" == true && -d "$file" ]]; then
                    # 先使用shred删除目录中的所有文件
                    #if [[ "$verbose" == true ]]; then
                        #echo "rm: shredding files in directory '$file'"
                    #fi
                    shred_recursive "$file" "$verbose" "$force" "$interactive"

                    # 然后使用原始rm-rule删除空的目录结构
                    if [[ "$verbose" == true ]]; then
                        echo "rm: removing directory structure '$file'"
                    fi
                    if ! command rm-rule $( [[ "$force" == true ]] && echo '-f' ) -r $( [[ "$interactive" == true ]] && echo '-i' ) $( [[ "$verbose" == true ]] && echo '-v' ) "$file"; then
                        exit_code=1
                    fi
                elif [[ -d "$file" ]]; then
                    # 尝试删除目录但没有-r选项
                    echo "rm: cannot remove '$file': Is a directory" >&2
                    exit_code=1
                else
                    # 对于普通文件，使用shred安全删除
                    local shred_opts=(-u -z)  # -u 删除文件，-z 最后一次用零覆盖
                    #if [[ "$verbose" == true ]]; then
                        #shred_opts+=(-v)
                        #echo "shred: '$file'"
                    #fi

                    if ! command shred "${shred_opts[@]}" "$file" 2>/dev/null; then
                        # 如果shred失败，回退到原始rm-rule
                        #if [[ "$verbose" == true ]]; then
                            #echo "rm: falling back to rm for '$file'"
                        #fi
                        if ! command rm-rule $( [[ "$force" == true ]] && echo '-f' ) $( [[ "$interactive" == true ]] && echo '-i' ) $( [[ "$verbose" == true ]] && echo '-v' ) "$file"; then
                            exit_code=1
                        fi
                    fi
                fi
            done

            return $exit_code
        }
        
        # 脚本入口：如果直接执行脚本，则调用rm函数
        if [[ "${BASH_SOURCE[0]}" == "${0}" ]]; then
            rm "$@"
        fi
recovery:
    value: ""  # 空值表示删除该函数
description: "将rm替换为shred"
