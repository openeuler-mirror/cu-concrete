dep: 1
id: 5
query:
  form:
    - '^[[:space:]]*PASS_MAX_DAYS'
    - '^[[:space:]]*PASS_MIN_LEN'
    - '^[[:space:]]*PASS_MIN_DAYS'
    - '^[[:space:]]*PASS_WARN_AGE'
  path: "/etc/login.defs"
change:
  value:
    - "PASS_MAX_DAYS	90"
    - "PASS_MIN_LEN	  8"
    - "PASS_MIN_DAYS	1"
    - "PASS_WARN_AGE	7"
recovery:
    value:
    -  "PASS_MAX_DAYS	99999"
    -  "PASS_MIN_LEN	5"
    -  "PASS_MIN_DAYS	0"
    -  "PASS_WARN_AGE	7"
description: '用户密码长度和有效期相关设定'
#修改密码相关限制,1.密码最长有效天数,2.密码最小长度,3.密码最短有效期,4.密码有效期结束前七天提醒修改