---
- name: Run harden and fetch cu-concrete from all hosts
  hosts: all
  gather_facts: no
  vars:
    cu_concrete_path: "/opt/cu-concrete"

  tasks:
    # === 第一步：在控制节点上生成唯一时间戳（只做一次）===
    - name: Set fixed timestamped backup root path
      delegate_to: localhost
      run_once: true
      ansible.builtin.set_fact:
        backup_root: "/backup/cu-concrete-{{ '%Y%m%d-%H%M%S' | strftime }}"

    - name: Ensure timestamped backup root directory exists on control node
      delegate_to: localhost
      run_once: true
      ansible.builtin.file:
        path: "{{ backup_root }}"
        state: directory
        mode: '0755'

    # --- 后续所有任务都使用 {{ backup_root }} ---
    - name: Check if cu-concrete directory exists on remote host
      ansible.builtin.stat:
        path: "{{ cu_concrete_path }}"
      register: cu_dir_check

    - name: Run hardening script (python3 main.py harden --all)
      when: cu_dir_check.stat.exists
      ansible.builtin.command:
        cmd: python3 main.py harden --all
        chdir: "{{ cu_concrete_path }}"
      changed_when: true

    - name: Create tar.gz with custom top-level dir name
      when: cu_dir_check.stat.exists
      ansible.builtin.shell:
        cmd: |
          cd /opt && \
          tar -czf "/tmp/cu-concrete-{{ inventory_hostname }}.tar.gz" \
              --transform "s|^cu-concrete|cu-concrete-{{ inventory_hostname }}|" \
              cu-concrete
        warn: false
      args:
        creates: "/tmp/cu-concrete-{{ inventory_hostname }}.tar.gz"

    - name: Fetch the tar.gz archive to control node
      when: cu_dir_check.stat.exists
      ansible.builtin.fetch:
        src: "/tmp/cu-concrete-{{ inventory_hostname }}.tar.gz"
        dest: "{{ backup_root }}/cu-concrete-{{ inventory_hostname }}.tar.gz"
        flat: yes

    - name: Clean up temporary tar file on remote host
      when: cu_dir_check.stat.exists
      ansible.builtin.file:
        path: "/tmp/cu-concrete-{{ inventory_hostname }}.tar.gz"
        state: absent

    - name: Extract each host's archive directly into timestamped backup root
      delegate_to: localhost
      ansible.builtin.unarchive:
        src: "{{ backup_root }}/cu-concrete-{{ item }}.tar.gz"
        dest: "{{ backup_root }}"
        remote_src: false
      loop: "{{ groups['all'] }}"

    - name: Remove fetched .tar.gz files from control node
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ backup_root }}/cu-concrete-{{ item }}.tar.gz"
        state: absent
      loop: "{{ groups['all'] }}"